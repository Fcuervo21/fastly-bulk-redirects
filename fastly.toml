# This file describes a Fastly Compute package. To learn more visit:
# https://www.fastly.com/documentation/reference/compute/fastly-toml

authors = ["developer@example.com"]
description = "Bulk URL redirects at the edge using Fastly Compute and Config Store"
language = "javascript"
manifest_version = 3
name = "fastly-bulk-redirects"

[local_server]

[scripts]
  build = "npm exec js-compute-runtime ./src/index.js ./bin/main.wasm"

[setup]

  [setup.config_stores]

    [setup.config_stores.redirects]
      description = "Bulk URL redirect table — maps source paths to destination URLs with status codes"
